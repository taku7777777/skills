name: skills-quality

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill packages and quality assets
        run: python3 scripts/validate_skills.py
      - name: Validate routing cases
        run: python3 scripts/eval_routing.py --validate-only
      - name: Validate task fixtures and hidden rubrics
        run: python3 scripts/eval_tasks.py validate
      - name: Run evaluation infrastructure regression tests
        run: python3 -m unittest discover -s tests -v
